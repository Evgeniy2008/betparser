      body {
        margin: 0;
      }
      .loadingSpinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #ff5500;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        position: absolute;
        top: calc(50% - 20px);
        left: calc(50% - 20px);
        animation: spin 1s linear infinite;
      }

      .loadingSpinner.spin {
        animation: spin 2s linear infinite;
      }

      @keyframes fadeColor {
        0% { border-top: 4px solid #f3f3f3; transform: rotate(-20deg); }
        100% { border-top: 4px solid #ff5500; transform: rotate(0deg); }
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .overflowHidden {
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        display: block;
        position: absolute;
        top: 0;
      }

      #root {
        display: none;
      }

      #loadingOverlay {
        position: absolute;
        background: #f1f3f7;
        height: 100%;
        width: 100%;
        z-index: 999;
        transition: all 500ms;
        -webkit-transition: all 500ms;
        -moz-transition: all 500ms;
